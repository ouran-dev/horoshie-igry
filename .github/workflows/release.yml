name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish application
        run: dotnet publish HoroshieIgry.csproj -c Release -r win-x64 --self-contained -o publish

      - name: Install vpk
        run: dotnet tool install -g vpk --version 1.2.0

      - name: Pack Velopack release
        run: vpk pack -u HoroshieIgry -v ${{ steps.version.outputs.version }} -p publish -e HoroshieIgry.exe --packTitle "Хорошие игры" -o Releases

      - name: Upload to GitHub Releases
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          vpk upload github `
            -o Releases `
            --repoUrl "https://github.com/${{ github.repository }}" `
            --token "$env:GITHUB_TOKEN" `
            --publish `
            --tag "${{ github.ref_name }}" `
            --releaseName "Хорошие игры ${{ steps.version.outputs.version }}"
